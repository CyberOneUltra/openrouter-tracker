name: Daily Scrape & Deploy

on:
  schedule:
    # UTC 1:05 = CST 9:05
    - cron: '5 1 * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run scraper (with retry)
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=60
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Attempt $i/$MAX_RETRIES..."
            if node scraper.js; then
              echo "✅ Scraper succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Failed. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          echo "❌ Scraper failed after $MAX_RETRIES attempts"
          exit 1

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json dashboard.html
          git diff --staged --quiet || git commit -m "📊 Update data $(date -u +%Y-%m-%d)"
          git push
